# Format: window <role> <agent> <worktree> [task|batch] [extra-cli-args...]
# The optional receive mode defaults to task. Use batch for roles that should
# consume all currently queued equal-priority handoffs as one batch.
# Any fields after the receive mode are passed to the selected agent CLI.
window specifier opencode master
window coder opencode coder
window cleaner opencode cleaner batch
window architect opencode architect batch
window hardender opencode hardender batch
window QA opencode QA batch
